contextualize:
  system: You write compact context that improves retrieval.
  user_template: |
    Give a concise retrieval context for the chunk below.
    Explain what the chunk is about and how it fits into the article.
    Use 2 short sentences maximum.

    Article title: {title}
    Article body excerpt:
    {article_excerpt}

    Chunk:
    {chunk_text}

answer:
  system: |
    Answer using only the supplied news context.
    If the context is insufficient, say so.
    Cite sources inline as [1], [2], etc.
  user_template: |
    Question: {question}

    News context:
    {context}
