services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage_v117:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-cortexpulse_news}
      GUARDIAN_QUERY: ${GUARDIAN_QUERY:-artificial intelligence}
      MAX_ARTICLES: ${MAX_ARTICLES:-1}
      CHUNK_SIZE: ${CHUNK_SIZE:-400}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-4}
      CITATION_SNIPPET_CHARS: ${CITATION_SNIPPET_CHARS:-260}
      CONTEXTUALIZATION_ENABLED: ${CONTEXTUALIZATION_ENABLED:-false}
      OPENAI_ANSWER_TEMPERATURE: ${OPENAI_ANSWER_TEMPERATURE:-0.2}
      OPENAI_CONTEXTUALIZE_TEMPERATURE: ${OPENAI_CONTEXTUALIZE_TEMPERATURE:-0}
      MAX_ARTICLE_CONTEXT_CHARS: ${MAX_ARTICLE_CONTEXT_CHARS:-6000}
      CONTEXTUALIZATION_CONCURRENCY: ${CONTEXTUALIZATION_CONCURRENCY:-2}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-20}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_INITIAL_BACKOFF_SECONDS: ${RETRY_INITIAL_BACKOFF_SECONDS:-0.75}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER:-2}
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-3}
      CIRCUIT_BREAKER_RESET_SECONDS: ${CIRCUIT_BREAKER_RESET_SECONDS:-30}
    depends_on:
      - qdrant

volumes:
  qdrant_storage_v117:
